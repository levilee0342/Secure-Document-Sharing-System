services:
  # Keycloak (OIDC)
  keycloak:
    image: quay.io/keycloak/keycloak:26.0.2
    command: start-dev --http-port=9090 --spi-login-protocol-openid-connect-legacy-logout-redirect-uri=true
    environment:
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
    ports:
      - "9090:9090"
    networks:
      - system-net

  # MinIO (S3 storage)
  minio:
    image: quay.io/minio/minio:latest
    container_name: minio
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"   # API (S3)
      - "9001:9001"   # Web UI
    volumes:
      - minio_data:/data
    networks:
      - system-net

  # Vault (Secret Manager)
  vault:
    image: hashicorp/vault:1.14
    container_name: vault
    environment:
      VAULT_DEV_ROOT_TOKEN_ID: "root-token"
      VAULT_ADDR: "http://0.0.0.0:8200"
    ports:
      - "8200:8200"
    cap_add:
      - IPC_LOCK
    command: "server -dev -dev-root-token-id=root-token"
    networks:
      - system-net

  # Kafka
  zookeeper:
    image: confluentinc/cp-zookeeper:latest
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "2181:2181"
    networks:
      - app-net

  kafka:
    image: confluentinc/cp-kafka:7.2.1
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092,PLAINTEXT_HOST://kafka:29092
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,PLAINTEXT_HOST://0.0.0.0:29092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
    networks:
      - app-net

  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: system-share-document-kafka-ui
    ports:
      - "9080:8080"
    environment:
      - KAFKA_CLUSTERS_0_NAME=local
      - KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS=kafka:29092
      - KAFKA_CLUSTERS_0_ZOOKEEPER=zookeeper:2181
    depends_on:
      - kafka
      - zookeeper
    networks:
      - app-net

  flink-jobmanager:
    build:
      context: .
      dockerfile: Dockerfile.flink-java17
    image: flink-jobmanager-custom
    container_name: flink-jobmanager
    ports:
      - "8181:8081"
      - "6123:6123"
    command: jobmanager
    volumes:
      - ../jars:/jars
      - ./flink-conf.yaml:/opt/flink/conf/flink-conf.yaml
    networks:
      - app-net
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8081" ]
      interval: 10s
      timeout: 5s
      retries: 5

  flink-taskmanager:
    build:
      context: .
      dockerfile: Dockerfile.flink-java17
    image: flink-taskmanager-custom
    container_name: flink-taskmanager
    depends_on:
      flink-jobmanager:
        condition: service_healthy
    command: taskmanager
    volumes:
      - ../jars:/jars
      - ./flink-conf.yaml:/opt/flink/conf/flink-conf.yaml
    networks:
      - app-net

networks:
  system-net:
    driver: bridge
  app-net:
    driver: bridge

volumes:
  minio_data:
